name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ] # mainブランチにプッシュされた時に実行

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # 使用している.NETのバージョンに合わせる

      - name: Publish app
        run: |
          dotnet --version
          dotnet publish -c Release -o publish

      - name: Show publish output (for debug)
        run: ls -la publish/wwwroot || true

      - name: Fix hashed Blazor runtime filenames
        run: |
          set -e
          FWDIR=publish/wwwroot/_framework
          if [ -d "$FWDIR" ]; then
            cd "$FWDIR"
            # copy the first matching blazor.webassembly.*.js to blazor.webassembly.js
            for f in blazor.webassembly.*.js; do
              if [ -f "$f" ]; then
                cp -n "$f" blazor.webassembly.js || true
                break
              fi
            done
            # copy compressed variants if present
            for f in blazor.webassembly.*.js.br; do
              if [ -f "$f" ]; then
                cp -n "$f" blazor.webassembly.js.br || true
                break
              fi
            done
            for f in blazor.webassembly.*.js.gz; do
              if [ -f "$f" ]; then
                cp -n "$f" blazor.webassembly.js.gz || true
                break
              fi
            done
          else
            echo "_framework folder not found"
          fi

      # リロード対策（index.htmlを404.htmlとしてコピー）
      - name: copy index.html to 404.html
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: publish/wwwroot # 公開するフォルダ
          branch: gh-pages # 公開用の専用ブランチに自動デプロイ
